# Default config for Gemma 4 E4B torchax baseline.
# Loaded by `train.py --config config.yaml`. CLI flags override these.
# Every key here matches an argparse dest in train.py.

model_id: google/gemma-4-E4B
dataset: wikitext-2-raw-v1
seq_len: 2048
batch_size: 4          # per-chip; global batch = batch_size * dp
steps: 20
learning_rate: 1.0e-5
warmup_steps: 2
dp: 1
tp: 8                  # v6e-8
dtype: bf16
log_every: 1
grad_accum: 1
seed: 42

# Profiling defaults. `run.sh` passes these explicitly; they are here as
# documentation of the expected shape.
# profile_dir: (set per-run by run.sh)
# profile_steps: [5, 6, 7]
